const ITER = 600000;
async function tryOpen(pass){
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(pass), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey({name:'PBKDF2', salt:SALT, iterations:ITER, hash:'SHA-256'}, km, {name:'AES-GCM', length:256}, false, ['decrypt']);
  const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv:IV}, key, CT);
  sessionStorage.setItem('rbp', pass);
  document.open(); document.write(new TextDecoder().decode(plain)); document.close();
}
document.getElementById('go').onclick = async ()=>{
  const b = document.getElementById('go'); b.disabled = true;
  document.getElementById('err').textContent = '';
  try { await tryOpen(document.getElementById('pw').value); }
  catch(e){ document.getElementById('err').textContent = '合言葉が違います'; b.disabled = false; }
};
document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('go').click(); });
const saved = sessionStorage.getItem('rbp');
if (saved) tryOpen(saved).catch(()=>sessionStorage.removeItem('rbp'));
</script>
