  <style>
    :root{color-scheme:light;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 82% 8%,rgba(37,99,235,.24),transparent 34%),linear-gradient(135deg,#0f1b32 0%,#1e3a63 58%,#245ee8 100%);color:#111827}
    .box{width:min(100%,440px);padding:32px;border:1px solid rgba(255,255,255,.45);border-radius:24px;background:rgba(255,255,255,.98);box-shadow:0 28px 70px rgba(2,8,23,.34)}
    .kicker{margin:0 0 10px;color:#2563eb;font-size:11px;font-weight:900;letter-spacing:.12em}
    h1{margin:0;color:#0f172a;font-size:clamp(23px,6vw,30px);line-height:1.4}
    .lead{margin:12px 0 22px;color:#526176;font-size:13px;line-height:1.75}

    input{width:100%;height:48px;padding:0 14px;border:1px solid #cbd5e1;border-radius:12px;background:#fff;color:#0f172a;font:inherit}
    input:focus{border-color:#2563eb;outline:3px solid rgba(37,99,235,.15)}
    button{width:100%;height:48px;margin-top:12px;border:0;border-radius:12px;background:#2563eb;color:#fff;font:inherit;font-weight:900;cursor:pointer}
    button:hover{background:#1d4ed8}
    button:disabled{opacity:.55;cursor:wait}
    .error{min-height:22px;margin:9px 0 0;color:#b91c1c;font-size:13px;font-weight:800}
    .status{margin:12px 0 0;color:#64748b;font-size:11px}
  </style>
</head>

    const ITERATIONS = 600000;
    const STORAGE_KEY = "rebear-proposal-workshop-passphrase-v1";

    async function decrypt(passphrase) {
      const encoded = new TextEncoder().encode(passphrase);
      const material = await crypto.subtle.importKey(
        "raw",
        encoded,
        "PBKDF2",
        false,
        ["deriveKey"],
      );
      const key = await crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt: SALT,
          iterations: ITERATIONS,
          hash: "SHA-256",
        },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"],
      );
      const plain = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: IV },
        key,
        CIPHERTEXT,
      );
      sessionStorage.setItem(STORAGE_KEY, passphrase);
      document.open();
      document.write(new TextDecoder().decode(plain));
      document.close();
    }

    const form = document.getElementById("unlock-form");
    const input = document.getElementById("passphrase");
    const button = document.getElementById("unlock-button");
    const error = document.getElementById("unlock-error");
    const status = document.getElementById("unlock-status");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      button.disabled = true;
      error.textContent = "";
      status.textContent = "端末内で復号しています…";
      try {
        await decrypt(input.value);
      } catch {
        error.textContent = "合言葉が一致しません。";
        status.textContent = "資料の平文は公開サーバーに保存されていません。";
        input.select();
        button.disabled = false;
      }
    });

    const saved = sessionStorage.getItem(STORAGE_KEY);
    if (saved) {
      status.textContent = "保存済みの合言葉で復号しています…";
      decrypt(saved).catch(() => {
        sessionStorage.removeItem(STORAGE_KEY);
        status.textContent = "資料の平文は公開サーバーに保存されていません。";
      });
    }
  </script>
